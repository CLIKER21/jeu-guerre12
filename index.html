<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My War Empire</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src='https://libtl.com/sdk.js' data-zone='11018518' data-sdk='show_11018518'></script>
    </head>
<body>

    <h1 id="titre-tma">🪖 Command HQ</h1>
<div class="stats">
        <p>Gold available: <span id="or">0</span> 💰</p>
        <p>Trained soldiers: <span id="soldiers">0</span> 🎖️</p>
        <div class="production">Passive income: +<span id="speed">0</span> Gold / sec</div>
    </div>

    <button onclick="generateOr()">⛏️ Mine the Gold Mine (+10 Gold)</button>
    <button onclick="recruitSoldier()">➕ Recruit 1 Soldier (Costs 50 Gold)</button>
    
    <button class="btn-pub" onclick="watchAdvertising()">📺 Bonus: +100 Gold (Video)</button>

    <button class="btn-share" onclick="shareTheGame()">🔗 Invite Allies (+ Recruit)</button>

    <div class="mission-box">
        <h3>🎯 Mission: Assault on the Outpost</h3>
        <p>Enemy defense required: <b>10 Soldiers</b> 🛡️</p>
        <p>Victory reward: <b>+500 Gold</b> 💰</p>
        <button class="btn-attack" onclick="attackEnemy()">⚔️ Launch Assault!</button>
    </div>
<style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1c2024; color:white; padding: 20px; margin: 0; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #f1c40f; }
        button { background: #e67e22; border:none; padding: 14px 20px; color:white; font-size: 16px; border-radius: 8px; cursor: pointer; margin: 8px 0; display: inline-block; width: 90%; max-width: 320px; font-weight: bold; box-shadow: 0 4px 6px rgba(0,0,0,0.2); }
        button:hover { background: #d35400; }
        .btn-pub { background: #2ecc71; }
        .btn-pub:hover { background: #27ae60; }
        .btn-attack { background: #c0392b; }
        .btn-attack:hover { background: #962d22; }
        .btn-share { background: #3498db; }
        .btn-share:hover { background: #2980b9; }
        .stats { font-size: 18px; margin: 15px 0; background: #2c3e50; padding: 15px; border-radius: 8px; border: 1px solid #34495e; }
        .production { color: #2ecc71; font-size: 14px; margin-top: 5px; font-weight: bold; }
        .mission-box { background: #2f3640; border: 2px dashed #718093; padding: 15px; border-radius: 8px; margin-top: 20px; }
    </style>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const first_name = tg.initDataUnsafe.user.first_name;
            document.getElementById('title-tma').innerText = `🪖 HQ of ${first name}`;
        }
let or = parseFloat(localStorage.getItem('war_or')) || 0;
        let soldiers = parseInt(localStorage.getItem('war_soldiers')) || 0;

        UpdateDisplay();

        function vibrateTelephone() {
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        function shareTheGame() {
            vibratePhone();
            const gamelink = "https://t.me/MonGuerreSuperBot/start";
            const messageText = "🚀 Come help me build the most powerful army on Telegram! Click here to play with me:";
            tg.openTelegramLink(`https://t.me/share/url?url=${encodeURIComponent(gamelink)}&text=${encodeURIComponent(messageTexte)}`);
        }
function generateOr() {
            vibratePhone();
            or += 10;
            UpdateDisplay();
            saveGame();
        }

        function recruitSoldier() {
            vibratePhone();
            if (or >= 50) {
                gold -= 50;
                soldiers += 1;
                UpdateDisplay();
                saveGame();
            } else {
                tg.showAlert("Alert! You do not have enough gold to recruit this soldier.");
            }
        }

        function attackEnemy() {
            vibratePhone();
            if (soldiers >= 10) {
                soldiers -= 5; 
                gold += 500;    
                UpdateDisplay();
                saveGame();
                tg.showAlert("🏆 VICTORY! Your troops have crushed the enemy. Loot: +500 Gold.");
            } else {
                tg.showAlert("❌ FAIL! You need at least 10 soldiers to launch this assault.");
            }
        }
// 🟢 ADVERTISING FUNCTION CORRECTED AND SECURE PC/MOBILE
        function watchAdvertisement() {
            vibratePhone();
            
            // Automatic PC detection (Windows 7/8/10, Mac, Linux)
            const isOnPC = navigator.userAgent.toLowerCase().match(/(windows|macintosh|linux)/) && !navigator.userAgent.toLowerCase().match(/android/);
            
            if (isOnPC) {
                tg.showAlert("⚠️ Bonus videos are only available on the Telegram application on your Phone!");
                return; 
            }

            // Running Rewarded Interstitial format on smartphone
            if (typeof show_11018518 === 'function') {
                show_11018518().then(() => {
                    gold += 100;
                    UpdateDisplay();
                    saveGame();
                    tg.showAlert("Thank you! Your support earns you +100 Gold! 💰");
                }).catch((error) => {
                    tg.showAlert("Advertising currently unavailable, try again.");
                });
            } else {
                tg.showAlert("The ad network is loading... Try again in 3 seconds.");
            }
        }
// Passive production
        setInterval(function() {
            if (soldiers > 0) {
                gold += soldiers; 
                UpdateDisplay();
                saveGame();
            }
        }, 1000);

        function saveGame() {
            localStorage.setItem('war_gold', gold);
            localStorage.setItem('war_soldiers', soldiers);
        }

        function UpdateDisplay() {
            document.getElementById('or').innerText = Math.floor(or);
            document.getElementById('soldiers').innerText = soldiers;
            document.getElementById('speed').innerText = soldiers;
        }
    </script>
</body>
</html>
